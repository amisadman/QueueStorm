# air.toml
# Config file for Air (https://github.com/cosmtrek/air)

root = "."
tmp_dir = "tmp"

[build]
  # Windows binary needs .exe extension
  bin = "tmp\\main.exe"
  cmd = "go build -o tmp\\main.exe .\\cmd\\server\\main.go"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "tests"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = ["cmd", "internal"]
  include_ext = ["go", "tpl", "html", "toml"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
